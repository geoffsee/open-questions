name: Morning Agent Contribution

on:
  schedule:
    # 08:45 America/New_York — GitHub cron is UTC-only, so cover EST and EDT
    - cron: "45 12 * * *" # 08:45 EDT (UTC-4)
    - cron: "45 13 * * *" # 08:45 EST (UTC-5)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contribute:
    runs-on: ubuntu-latest
    env:
      # Base64-encoded .mcp.json stored as a repo secret. May contain secrets;
      # it is decoded to a file at runtime and never printed to the logs.
      MCP_CONFIG: ${{ secrets.MCP_CONFIG }}
    defaults:
      run:
        working-directory: apps/example
    steps:
      - name: Confirm Eastern Time window
        if: github.event_name == 'schedule'
        run: |
          eastern="$(TZ=America/New_York date '+%H:%M')"
          hour="${eastern%%:*}"
          minute="${eastern##*:}"
          # Tolerate Actions schedule drift around 08:45 Eastern
          if [ "$hour" != "08" ] || [ "$minute" -lt 40 ] || [ "$minute" -gt 55 ]; then
            echo "Skipping: Eastern time is $eastern (want ~08:45)."
            echo "skip=true" >> "$GITHUB_ENV"
          else
            echo "Running at Eastern $eastern"
            echo "skip=false" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.skip != 'true'

      - uses: oven-sh/setup-bun@v2
        if: env.skip != 'true'

      - name: Install dependencies
        if: env.skip != 'true'
        run: bun install

      - name: Materialize MCP config
        if: env.skip != 'true' && env.MCP_CONFIG != ''
        run: |
          # Restrict permissions on any file we create in this step.
          umask 077
          # Decode without echoing the (possibly secret-bearing) contents.
          printf '%s' "$MCP_CONFIG" | base64 -d > .mcp.json
          # Fail fast on a malformed secret without printing the file.
          if ! node -e "JSON.parse(require('fs').readFileSync('.mcp.json','utf8'))" 2>/dev/null; then
            echo "::error::MCP_CONFIG did not decode to valid JSON." >&2
            rm -f .mcp.json
            exit 1
          fi
          echo "Wrote .mcp.json ($(wc -c < .mcp.json) bytes)."

      - name: Claim a problem and save a contribution
        if: env.skip != 'true'
        run: bun run start:anthropic
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSOLVED_MCP_URL: https://unsolved-problems-api.seemueller.workers.dev/mcp
          UNSOLVED_AGENT_ID: github-actions-morning
          UNSOLVED_PICK_MODE: random
          ANTHROPIC_MODEL: claude-sonnet-4-5

      - name: Remove materialized MCP config
        if: always()
        run: rm -f .mcp.json
